  const [err, setErr] = useState(false);
  const emoji = who === "masaya" ? "👨" : "👩";
  const rad = radius != null ? radius : Math.round(size * 0.24);

// ================================================================
// § music  ─  BGMエンジン（Web Audio APIで生成・ライセンスフリー）
//   外部音源ファイルに頼らず、シーン別に複数のチップチューンを再生する。
//   ・title    タイトル（希望に満ちた明るい曲）
//   ・peaceful 会話／アイテム（穏やかなメロディ）
//   ・battle   通常バトル（疾走感のある戦闘曲）
//   ・boss     ボス戦（緊迫したダーク曲）
//   ・victory  勝利・スキル習得（明るいファンファーレ）
//   ・ending   エンディング（あたたかいバラード）
//   ・gameover ゲームオーバー（もの悲しい曲）
// ================================================================
const MusicEngine = (() => {
  let ctx = null, master = null, sfxGain = null, muted = false;
  let curName = null, track = null, step = 0, nextTime = 0, timer = null;

  // 音名→周波数テーブル（A4=440Hz基準）
  const NOTE = {};
  const NM = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  for (let o = 1; o <= 6; o++) for (let i = 0; i < 12; i++) {
    const midi = 12 * (o + 1) + i;
    NOTE[NM[i] + o] = 440 * Math.pow(2, (midi - 69) / 12);
  }

  // 各トラック：tempo(BPM)、lead(主旋律)、bass(伴奏)。各ステップ＝8分音符、nullは休符。
  const TRACKS = {
    title: { tempo:112, leadType:"square", bassType:"triangle",
      lead:["E4","G4","C5","G4","A4","G4","E4",null,"D4","E4","G4","E4","C4",null,null,null],
      bass:["C3",null,"G2",null,"A2",null,"E2",null,"F2",null,"G2",null,"C3",null,"G2",null] },
    peaceful: { tempo:84, leadType:"triangle", bassType:"sine",
      lead:["G4",null,"E4",null,"C4",null,"E4",null,"D4",null,"E4",null,"G4",null,null,null],
      bass:["C3",null,null,null,"A2",null,null,null,"F2",null,null,null,"G2",null,null,null] },
    battle: { tempo:152, leadType:"square", bassType:"triangle",
      lead:["A4","C5","E5","C5","A4","E5","D5","C5","B4","D5","F5","D5","E5",null,"E5",null],
      bass:["A2",null,"A2",null,"F2",null,"F2",null,"G2",null,"G2",null,"E2",null,"E2",null] },
    boss: { tempo:160, leadType:"sawtooth", bassType:"square",
      lead:["E4","E4","G4","E4","D4","E4","C4",null,"B3","C4","D4","E4","B3",null,null,null],
      bass:["E2",null,"E2","E2","C2",null,"C2","C2","D2",null,"D2","D2","B1",null,"B1",null] },
    victory: { tempo:140, leadType:"square", bassType:"triangle",
      lead:["C5","E5","G5","C6","G5","C6",null,null,"C5","E5","G5","C6",null,null,null,null],
      bass:["C3",null,"G2",null,"C3",null,"C3",null,"C3",null,"G2",null,"C3",null,null,null] },
    ending: { tempo:76, leadType:"triangle", bassType:"sine",
      lead:["A4",null,"G4",null,"F4",null,"G4",null,"A4",null,"C5",null,"A4",null,null,null],
      bass:["F2",null,null,null,"C3",null,null,null,"D3",null,null,null,"G2",null,"C3",null] },
    gameover: { tempo:70, leadType:"triangle", bassType:"sine",
      lead:["A4",null,null,null,"G4",null,null,null,"F4",null,null,null,"E4",null,null,null],
      bass:["A2",null,null,null,"F2",null,null,null,"D2",null,null,null,"E2",null,null,null] },
  };

  function ensure() {
    if (ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    ctx = new AC();
    master = ctx.createGain();
    master.gain.value = muted ? 0 : 0.16;
    master.connect(ctx.destination);
    sfxGain = ctx.createGain();
    sfxGain.gain.value = muted ? 0 : 0.24;
    sfxGain.connect(ctx.destination);
  }
  function tone(freq, start, dur, type, vol) {
    if (!freq) return;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    o.connect(g); g.connect(master);
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    o.start(start); o.stop(start + dur + 0.05);
  }
  function scheduler() {
    if (!ctx || !track) return;
    const spb = 60 / track.tempo / 2; // 8分音符の長さ
    while (nextTime < ctx.currentTime + 0.14) {
      const lead = track.lead[step % track.lead.length];
      const bass = track.bass ? track.bass[step % track.bass.length] : null;
      tone(NOTE[lead], nextTime, spb * 0.9,  track.leadType || "square",   0.45);
      tone(NOTE[bass], nextTime, spb * 0.95, track.bassType || "triangle", 0.55);
      nextTime += spb; step++;
    }
  }
  function play(name) {
    if (name === curName) return;
    ensure();
    if (!ctx) return;
    curName = name;
    track = TRACKS[name] || null;
    if (!track) { stop(); return; }
    step = 0; nextTime = ctx.currentTime + 0.06;
    if (timer) clearInterval(timer);
    timer = setInterval(scheduler, 40);
    if (ctx.state === "suspended") ctx.resume();
  }
  function stop() { if (timer) { clearInterval(timer); timer = null; } track = null; curName = null; }
  function setMuted(m) { muted = m; if (master) master.gain.value = m ? 0 : 0.16; if (sfxGain) sfxGain.gain.value = m ? 0 : 0.24; }
  function unlock() { ensure(); if (ctx && ctx.state === "suspended") ctx.resume(); }

  // ── SE（効果音）── BGMと同じくWeb Audioで生成 ─────────────
  function beep(freq, start, dur, type, vol) {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    o.connect(g); g.connect(sfxGain);
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    o.start(start); o.stop(start + dur + 0.03);
  }
  function noise(start, dur, vol) {
    const len = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const s = ctx.createBufferSource(); s.buffer = buf;
    const g = ctx.createGain(); g.gain.value = vol;
    s.connect(g); g.connect(sfxGain); s.start(start);
  }
  const SFX = {
    confirm: t => { beep(740, t, 0.06, "square", 0.30); beep(1110, t + 0.05, 0.08, "square", 0.28); },
    hit:     t => { noise(t, 0.13, 0.35); beep(150, t, 0.12, "sawtooth", 0.32); },
    skill:   t => { [880, 1175, 1568].forEach((f, i) => beep(f, t + i * 0.05, 0.09, "square", 0.26)); },
    heal:    t => { [784, 1047, 1319].forEach((f, i) => beep(f, t + i * 0.08, 0.14, "sine", 0.30)); },
    damage:  t => { noise(t, 0.10, 0.28); beep(330, t, 0.10, "sawtooth", 0.30); beep(220, t + 0.07, 0.16, "sawtooth", 0.28); },
  };
  function sfx(name) {
    ensure(); if (!ctx) return;
    const fn = SFX[name]; if (!fn) return;
    if (ctx.state === "suspended") ctx.resume();
    fn(ctx.currentTime + 0.01);
  }
  return { play, setMuted, unlock, sfx };
})();

// ================================================================
// § gameUtils  ─  乱数・計算・セーブ・ロード
// ================================================================

const rand      = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
const calcPhys  = (atk, def) => Math.max(1, atk - Math.floor(def * .5) + rand(-6, 6));
const calcSkill = (atk, mult, def) => Math.max(1, Math.floor(atk * mult) + rand(-8, 8) - Math.floor(def * .3));
const wait      = ms => new Promise(r => setTimeout(r, ms));
const SAVE_KEY  = "natsumiRPG_v2";

function fmtDate(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
function saveGame(data) {
  const json = JSON.stringify({ ...data, savedAt: Date.now() });
  try { localStorage.setItem(SAVE_KEY, json); } catch {}
  try {
    const blob = new Blob([json], { type:"application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = "natsumi_save.json";
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  } catch {}
}
function loadGame() {
  try { const s = localStorage.getItem(SAVE_KEY); return s ? JSON.parse(s) : null; } catch { return null; }
}
function loadGameFromFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => { try { resolve(JSON.parse(e.target.result)); } catch { reject(); } };
    reader.onerror = reject;
    reader.readAsText(file);
  });
}

function StatusBar({ current, max, type="hp", label }) {
  const pct  = Math.max(0, Math.min(100, current / max * 100));
  const grad = type === "mp"
    ? "linear-gradient(90deg,#3b82f6,#60a5fa)"
    : pct > 50 ? "linear-gradient(90deg,#22c55e,#4ade80)"
    : pct > 25 ? "linear-gradient(90deg,#eab308,#facc15)"
    :             "linear-gradient(90deg,#ef4444,#f87171)";
  return (
    <div style={{ marginBottom:4 }}>
      <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"#94a3b8", marginBottom:2 }}>
        <span style={{ color: type==="mp" ? "#60a5fa" : "#94a3b8" }}>{label || (type==="hp" ? "HP" : "MP")}</span>
        <span style={{ fontWeight:"bold", color: type==="hp" && pct<25 ? "#f87171" : "#e2e8f0" }}>{current} / {max}</span>
      </div>
      <div style={{ height:7, background:"#1e293b", borderRadius:4, overflow:"hidden", border:"1px solid #334155" }}>
        <div style={{ width:`${pct}%`, height:"100%", background:grad, borderRadius:4, transition:"width .35s ease" }} />
      </div>
    </div>
  );
}

function DialogueScreen({ event, player, onDone, onGameOver, onRetryBoss, applyBondDelta, applyStatDelta, applyPartnerHpRestore, initialPageIdx, initialBranchId, onStateChange }) {
  const [pageIdx,  setPageIdx]  = useState(initialPageIdx  ?? 0);
  const [branchId, setBranchId] = useState(initialBranchId ?? null);
  const scrollRef = useRef(null);

  const buildInitHistory = () => {
    const result = [];
    const ip = initialPageIdx ?? 0;
    const ib = initialBranchId ?? null;
    if (ib) {
      for (const p of event.pages) result.push({ speaker:p.speaker, emoji:p.emoji, text:p.text });
      const bp = event.branches?.[ib] || [];
      for (let i = 0; i < ip; i++) { if (bp[i]) result.push({ speaker:bp[i].speaker, emoji:bp[i].emoji, text:bp[i].text }); }
    } else {
      for (let i = 0; i < ip; i++) { const p = event.pages[i]; if (p) result.push({ speaker:p.speaker, emoji:p.emoji, text:p.text }); }
    }
    return result;
  };
  const [history, setHistory] = useState(buildInitHistory);

  const pages = branchId ? (event.branches?.[branchId] || []) : event.pages;
  const page  = pages[pageIdx];

  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [history.length, pageIdx, branchId]);
  useEffect(() => {
    if (!page) return;
    if (page.bondDelta)        applyBondDelta(page.bondDelta);
    if (page.partnerHpRestore) applyPartnerHpRestore(page.partnerHpRestore);
  }, [pageIdx, branchId]);
  useEffect(() => { onStateChange?.(pageIdx, branchId); }, [pageIdx, branchId]);

  if (!page) { onDone(); return null; }

  const pushHistory = (p, choiceLabel) => setHistory(prev => [...prev, { speaker:p.speaker, emoji:p.emoji, text:p.text, choiceLabel }]);

  const advance = () => {
    if (page.gameOver)  { onGameOver();  return; }
    if (page.retryBoss) { onRetryBoss(); return; }
    pushHistory(page);
    const next = pageIdx + 1;
    if (next >= pages.length) { onDone(); return; }
    setPageIdx(next);
  };
  const handleChoice = (choice) => {
    pushHistory(page, choice.label);
    if (choice.bondDelta) applyBondDelta(choice.bondDelta);
    if (choice.statDelta) applyStatDelta(choice.statDelta);
    setBranchId(choice.branchId);
    setPageIdx(0);
  };

  const bgColor = event.bgColor || "#050a14";
  const bgStyle = event.bgImage
    ? { backgroundImage:`linear-gradient(180deg,rgba(5,5,15,.55),rgba(5,5,15,.82)), url(${event.bgImage})`, backgroundSize:"cover", backgroundPosition:"center" }
    : { background:`linear-gradient(180deg,${bgColor},#05050f)` };
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", ...bgStyle }}>
      <div style={{ padding:"5px 12px", borderBottom:"1px solid #1e293b", display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0 }}>
        <span style={{ color:"#94a3b8", fontSize:11 }}>💬 会話パート</span>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <span style={{ color:"#ec4899", fontSize:10 }}>絆</span>
          <div style={{ width:60, height:6, background:"#1e293b", borderRadius:3, overflow:"hidden", border:"1px solid #334155" }}>
            <div style={{ width:`${Math.min(100, player.bond)}%`, height:"100%", background:"linear-gradient(90deg,#ec4899,#f43f5e)", borderRadius:3, transition:"width .5s ease" }} />
          </div>
          <span style={{ color:"#f43f5e", fontSize:10, fontWeight:"bold" }}>{player.bond}</span>
        </div>
      </div>
      <div ref={scrollRef} style={{ flex:1, overflowY:"auto", padding:"10px 14px 6px", display:"flex", flexDirection:"column", gap:10 }}>
        {history.map((h, i) => <MsgBubble key={i} speaker={h.speaker} emoji={h.emoji} text={h.text} choiceLabel={h.choiceLabel} isPast />)}
        <MsgBubble speaker={page.speaker} emoji={page.emoji} text={page.text} isPast={false} />
      </div>
      <div style={{ padding:"6px 12px 10px", background:"#0c0c1a", borderTop:"1px solid #1e293b", flexShrink:0 }}>
        {page.choices ? (
          <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
            {page.choices.map((c, i) => (
              <button key={i} onClick={() => handleChoice(c)} style={{ padding:"11px 14px", background: i===0 ? "linear-gradient(135deg,#7f1d1d,#dc2626)" : "linear-gradient(135deg,#1e293b,#334155)", border:`1px solid ${i===0 ? "#f87171" : "#475569"}`, borderRadius:10, color:"#f1f5f9", fontSize:13, fontWeight:"bold", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <span>{c.label}</span>
                {c.effectLabel && <span style={{ color:"#fbbf24", fontSize:9 }}>{c.effectLabel}</span>}
              </button>
            ))}
          </div>
        ) : (
          <button onClick={advance} style={{ width:"100%", padding:"10px", background:"transparent", border:"1px solid #334155", borderRadius:10, color:"#64748b", fontSize:12, cursor:"pointer" }}>
            {page.gameOver || page.retryBoss ? "……" : "タップして続ける ▶"}
          </button>
        )}
      </div>
    </div>
  );
}

// ================================================================
// § App  ─  メインコンポーネント・シナリオ管理・バトルロジック
//
// phase:
//   "select_natsumi"        Natsumiのコマンド選択
//   "select_natsumi_skill"  Natsumiのスキル選択
//   "select_natsumi_item"   Natsumiのアイテム選択
//   "select_masaya"         Masayaのコマンド選択
//   "select_masaya_skill"   Masayaのスキル選択
//   "executing"             行動実行中
//   "victory"               勝利画面
//   "gameover"              ゲームオーバー
// ================================================================

function App() {
  const [screen,       setScreen]       = useState("title");
  const [player,       setPlayer]       = useState({ ...PLAYER_INITIAL });
  const [partner,      setPartner]      = useState({ ...PARTNER_INITIAL });
  const [items,        setItems]        = useState(ITEMS_DATA.map(i => ({ ...i })));
  const [scenarioIdx,  setScenarioIdx]  = useState(0);
  const [enemy,        setEnemy]        = useState(null);
  const [logs,         setLogs]         = useState([]);
  const [phase,        setPhase]        = useState("select_natsumi");
  const [shaking,      setShaking]      = useState(false);
  const [flashing,     setFlashing]     = useState(false);
  const [showToast,    setShowToast]    = useState(false);
  const [victoryInfo,  setVictoryInfo]  = useState(null);
  const [debugMode,    setDebugMode]    = useState(false);
  const [dialoguePage,   setDialoguePage]   = useState(0);
  const [dialogueBranch, setDialogueBranch] = useState(null);
  const [initDlgPage,    setInitDlgPage]    = useState(0);
  const [initDlgBranch,  setInitDlgBranch]  = useState(null);
  const [unlockedNat,    setUnlockedNat]    = useState([...NATSUMI_INITIAL_SKILLS]);
  const [unlockedMas,    setUnlockedMas]    = useState([...MASAYA_INITIAL_SKILLS]);
  const [equipment,      setEquipment]      = useState([]);
  const [showTitleConfirm, setShowTitleConfirm] = useState(false);
  const [showEquip,      setShowEquip]      = useState(false);
  const [musicMuted,     setMusicMuted]     = useState(() => { try { return localStorage.getItem("natsumiBGM_muted") === "1"; } catch { return false; } });

  const pendingNatRef = useRef(null); // Natsumiの保留アクション
  const boostFlagRef  = useRef(false); // 激励バフフラグ
  const pendingHugRef = useRef(null); // ハグ対象選択用

  const logRef = useRef(null);
  useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [logs]);
  const addLog = useCallback((text, type="normal") => setLogs(prev => [...prev, { text, type }]), []);
  const currentEvent = SCENARIO[scenarioIdx] || null;

  // ── BGM ──────────────────────────────────────────────────
  // 最初のユーザー操作で音声を有効化（ブラウザの自動再生制限対策）
  useEffect(() => {
    MusicEngine.setMuted(musicMuted);
    const unlock = () => MusicEngine.unlock();
    window.addEventListener("pointerdown", unlock);
    return () => window.removeEventListener("pointerdown", unlock);
  }, []);
  // シーンに応じてBGMを切り替える
  useEffect(() => {
    let track = "title";
    if      (screen === "title")                   track = "title";
    else if (screen === "ending")                  track = "ending";
    else if (phase  === "gameover")                track = "gameover";
    else if (phase  === "victory")                 track = "victory";
    else if (currentEvent?.type === "skill_unlock")track = "victory";
    else if (currentEvent?.type === "dialogue")    track = "peaceful";
    else if (currentEvent?.type === "item")        track = "peaceful";
    else if (currentEvent?.type === "battle")      track = enemy?.boss ? "boss" : "battle";
    MusicEngine.play(track);
  }, [screen, phase, currentEvent, enemy]);

  // ── セーブ / タイトル ────────────────────────────────────
  const handleSave = useCallback(() => {
    saveGame({ player, partner, items, scenarioIdx, dialoguePage, dialogueBranch, unlockedNat, unlockedMas, equipment });
    setShowToast(true); setTimeout(() => setShowToast(false), 1800);
  }, [player, partner, items, scenarioIdx, dialoguePage, dialogueBranch, unlockedNat, unlockedMas, equipment]);

  // タイトルへ戻る：必ず確認を挟む
  const goTitle = useCallback(() => setShowTitleConfirm(true), []);
  const confirmGoTitle = useCallback(() => { setShowTitleConfirm(false); setShowEquip(false); setScreen("title"); }, []);

  // 装備の着脱：ステータスに加減算（ネストした状態更新を避けてStrictMode安全）
  const toggleEquip = useCallback((equipId) => {
    const eq = equipment.find(e => e.id === equipId);
    if (!eq) return;
    const on = !eq.equipped, sign = on ? 1 : -1, b = eq.bonus || {};
    const upd = c => {
      const maxHp = c.maxHp + sign*(b.maxHp||0);
      const maxMp = c.maxMp + sign*(b.maxMp||0);
      return { ...c,
        attack:  c.attack  + sign*(b.attack ||0),
        defense: c.defense + sign*(b.defense||0),
        speed:   c.speed   + sign*(b.speed  ||0),
        maxHp, maxMp,
        hp: Math.max(1, Math.min(maxHp, on ? c.hp + (b.maxHp||0) : c.hp)),
        mp: Math.min(maxMp, on ? c.mp + (b.maxMp||0) : c.mp),
      };
    };
    if (eq.who === "Natsumi") setPlayer(upd); else setPartner(upd);
    setEquipment(prev => prev.map(e => e.id === equipId ? { ...e, equipped:on } : e));
  }, [equipment]);

  // アイテムイベントで装備を入手
  const handleItemEventDone = useCallback((ev) => {
    if (ev?.gifts) {
      setEquipment(prev => {
        const have = new Set(prev.map(e => e.id));
        const add = ev.gifts.filter(g => g.equipId && !have.has(g.equipId))
          .map(g => ({ id:g.equipId, who:g.who, name:g.name, emoji:g.emoji, bonus:g.bonus, equipped:false }));
        return add.length ? [...prev, ...add] : prev;
      });
    }
    advanceScenario(scenarioIdx);
  }, [scenarioIdx, advanceScenario]);

  // ── シナリオ起動 ─────────────────────────────────────────
  const startFromIdx = useCallback((idx) => {
    const ev = SCENARIO[idx];
    if (!ev) return;
    setScenarioIdx(idx);
    setScreen("battle");
    if (ev.type === "battle") {
      const en = { ...ENEMIES_DATA[ev.enemyId], hp: debugMode ? 1 : ENEMIES_DATA[ev.enemyId].maxHp };
      setEnemy(en);
      if (ev.partnerHpPenalty) setPartner(prev => ({ ...prev, hp: Math.max(1, prev.hp - ev.partnerHpPenalty) }));
      setLogs([{ text:"バトル開始！", type:"system" }, { text:`${en.name}が現れた！`, type:"system" }]);
      setPhase("select_natsumi");
    }
  }, [debugMode]);

  const advanceScenario = useCallback((fromIdx) => {
    const nextIdx = fromIdx + 1;
    if (nextIdx >= SCENARIO.length) return;
    const ev = SCENARIO[nextIdx];
    setScenarioIdx(nextIdx);
    if (ev.type === "battle") {
      const en = { ...ENEMIES_DATA[ev.enemyId], hp: debugMode ? 1 : ENEMIES_DATA[ev.enemyId].maxHp };
      if (ev.partnerHpPenalty) setPartner(prev => ({ ...prev, hp: Math.max(1, prev.hp - ev.partnerHpPenalty) }));
      setEnemy(en);
      setLogs([{ text:"バトル開始！", type:"system" }, { text:`${en.name}が現れた！`, type:"system" }]);
      setPhase("select_natsumi");
    }
  }, [debugMode]);

  // ── はじめから / 続きから / ファイルから ─────────────────
  const applyLoad = useCallback((save) => {
    setPlayer(save.player);
    setPartner(save.partner);
    setItems(save.items);
    setUnlockedNat(save.unlockedNat ?? [...NATSUMI_INITIAL_SKILLS]);
    setUnlockedMas(save.unlockedMas ?? [...MASAYA_INITIAL_SKILLS]);
    setEquipment(save.equipment ?? []);
    const pg = save.dialoguePage ?? 0;
    const br = save.dialogueBranch ?? null;
    setDialoguePage(pg); setInitDlgPage(pg);
    setDialogueBranch(br); setInitDlgBranch(br);
    startFromIdx(save.scenarioIdx ?? 0);
  }, [startFromIdx]);

  const startNewGame = useCallback(() => {
    setPlayer({ ...PLAYER_INITIAL }); setPartner({ ...PARTNER_INITIAL });
    setItems(ITEMS_DATA.map(i => ({ ...i })));
    setUnlockedNat([...NATSUMI_INITIAL_SKILLS]); setUnlockedMas([...MASAYA_INITIAL_SKILLS]);
    setEquipment([]);
    setDialoguePage(0); setInitDlgPage(0);
    setDialogueBranch(null); setInitDlgBranch(null);
    advanceScenario(-1); setScreen("battle");
  }, [advanceScenario]);

  const startContinue     = useCallback(() => { const s = loadGame(); if (s) applyLoad(s); }, [applyLoad]);
  const startContinueFile = useCallback((save) => {
    if (!save) return;
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch {}
    applyLoad(save);
  }, [applyLoad]);

  // ── 会話パートのコールバック ─────────────────────────────
  const handleDialogueDone = useCallback(() => {
    setDialoguePage(0); setInitDlgPage(0);
    setDialogueBranch(null); setInitDlgBranch(null);
    advanceScenario(scenarioIdx);
  }, [scenarioIdx, advanceScenario]);

  const handleDialogueGameOver = useCallback(() => setPhase("gameover"), []);
  const handleRetryBoss = useCallback(() => {
    for (let i = scenarioIdx; i >= 0; i--) {
      if (SCENARIO[i].type === "battle" && ENEMIES_DATA[SCENARIO[i].enemyId]?.boss) { startFromIdx(i); return; }
    }
  }, [scenarioIdx, startFromIdx]);

  const applyBondDelta        = useCallback(d => setPlayer(prev => ({ ...prev, bond: Math.min(100, Math.max(0, prev.bond + d)) })), []);
  const applyStatDelta        = useCallback(d => setPlayer(prev => ({ ...prev, stats: { ...prev.stats, ...Object.fromEntries(Object.entries(d).map(([k,v]) => [k, (prev.stats[k]||0)+v])) } })), []);
  const applyPartnerHpRestore = useCallback(a => setPartner(prev => ({ ...prev, hp: Math.min(prev.maxHp, prev.hp + a) })), []);

  // ── アニメーション ───────────────────────────────────────
  const hitAnimation = useCallback(() => new Promise(res => {
    MusicEngine.sfx("hit");
    setShaking(true);
    setTimeout(() => { setFlashing(true); setTimeout(() => { setShaking(false); setFlashing(false); res(); }, 110); }, 110);
  }), []);

  // ── 勝利処理 ─────────────────────────────────────────────
  const handleVictory = useCallback((en) => {
    const ev = SCENARIO[scenarioIdx];
    let levelUpMsg = null;
    let skillUnlockMsg = null;
    if (ev?.levelUp) {
      const { who, newLevel, skillUnlock } = ev.levelUp;
      levelUpMsg = `${who}がLv.${newLevel}になった！`;
      if (who === "Natsumi") setPlayer(prev => ({ ...prev, level: newLevel }));
      if (who === "Masaya")  setPartner(prev => ({ ...prev, level: newLevel }));
      if (skillUnlock) skillUnlockMsg = skillUnlock;
    }
    if (ev?.isFinal) { setPlayer(prev => ({ ...prev, level:21 })); levelUpMsg = "NatsumiがLv.21になった！ ─ ゲームクリア！"; }
    setVictoryInfo({ enemy: en, expGained: en.exp, levelUpMsg, skillUnlockMsg });
    setPhase("victory");
  }, [scenarioIdx]);

  // ── 全行動実行（素早さ順） ───────────────────────────────
  const executeAllActions = useCallback(async (natAction, masAction) => {
    setPhase("executing");
    boostFlagRef.current = false;

    let pl = { ...player };
    let pt = { ...partner };
    let en = { ...enemy };
    let ended = false;

    // 素早さ順ソート
    const actors = [
      { id:"natsumi", spd: pl.speed ?? 65 },
      ...(!pt.ko ? [{ id:"masaya", spd: pt.speed ?? 80 }] : []),
      { id:"enemy",   spd: en.speed ?? 50 },
    ].sort((a, b) => b.spd - a.spd);

    const masayCovering = masAction?.type === "skill" && masAction?.skill?.type === "cover";

    for (const actor of actors) {
      if (ended) break;
      if (actor.id === "enemy" && en.hp <= 0) continue;
      await wait(280);

      // ── Natsumi ──
      if (actor.id === "natsumi") {
        const atkMult = boostFlagRef.current ? 1.5 : 1.0;
        boostFlagRef.current = false;
        const act = natAction;

        if (act.type === "attack") {
          const dmg = calcPhys(Math.floor(pl.attack * atkMult), en.defense);
          addLog(`${atkMult > 1 ? "✨激励！" : ""}Natsumiの攻撃！ ${en.name}に${dmg}のダメージ！`, "damage");
          en = { ...en, hp: Math.max(0, en.hp - dmg) };
          setEnemy(prev => ({ ...prev, hp: en.hp })); await hitAnimation();
          if (en.hp <= 0) { handleVictory({ ...en }); ended = true; break; }

        } else if (act.type === "skill") {
          const sk = act.skill;
          if (pl.mp < sk.mpCost) {
            addLog("MPが足りない！ 通常攻撃に切り替え！", "system");
            const dmg = calcPhys(Math.floor(pl.attack * atkMult), en.defense);
            addLog(`Natsumiの攻撃！ ${en.name}に${dmg}のダメージ！`, "damage");
            en = { ...en, hp: Math.max(0, en.hp - dmg) };
            setEnemy(prev => ({ ...prev, hp: en.hp })); await hitAnimation();
            if (en.hp <= 0) { handleVictory({ ...en }); ended = true; break; }
          } else {
            pl = { ...pl, mp: pl.mp - sk.mpCost };
            setPlayer(prev => ({ ...prev, mp: pl.mp }));
            if (sk.type === "attack") {
              let dmg = calcSkill(Math.floor(pl.attack * atkMult), sk.powerMultiplier, en.defense);
              if (sk.partnered && !pt.ko) {
                dmg += Math.floor(pt.attack * 0.8);
                addLog(`NatsumiとMasayaの「${sk.name}」！`, "skill"); await wait(180);
                addLog(`${en.name}に${dmg}の大ダメージ！！`, "skill");
              } else {
                addLog(`Natsumiは「${sk.name}」！ ${en.name}に${dmg}のダメージ！`, "skill");
              }
              en = { ...en, hp: Math.max(0, en.hp - dmg) };
              setEnemy(prev => ({ ...prev, hp: en.hp })); await hitAnimation();
              if (en.hp <= 0) { handleVictory({ ...en }); ended = true; break; }
            } else if (sk.type === "heal") {
              MusicEngine.sfx("heal");
              const tgt = act.target || "self";
              if (tgt === "partner" && !pt.ko) {
                const h = Math.min(pt.maxHp - pt.hp, sk.healAmount);
                pt = { ...pt, hp: pt.hp + h }; setPartner(prev => ({ ...prev, hp: pt.hp }));
                addLog(`Natsumiは「${sk.name}」！ MasayaのHPが${h}回復！`, "heal");
              } else {
                const h = Math.min(pl.maxHp - pl.hp, sk.healAmount);
                pl = { ...pl, hp: pl.hp + h }; setPlayer(prev => ({ ...prev, hp: pl.hp }));
                addLog(`Natsumiは「${sk.name}」！ 自分のHPが${h}回復！`, "heal");
              }
            } else if (sk.type === "heal_both") {
              MusicEngine.sfx("heal");
              const hn = Math.min(pl.maxHp - pl.hp, sk.healAmount);
              pl = { ...pl, hp: pl.hp + hn }; setPlayer(prev => ({ ...prev, hp: pl.hp }));
              addLog(`Natsumiは「${sk.name}」！ NatsumiのHPが${hn}回復！`, "heal");
              if (!pt.ko) {
                const hm = Math.min(pt.maxHp - pt.hp, sk.healAmount);
                pt = { ...pt, hp: pt.hp + hm }; setPartner(prev => ({ ...prev, hp: pt.hp }));
                addLog(`MasayaのHPも${hm}回復！`, "heal");
              }
            }
          }
        } else if (act.type === "item") {
          MusicEngine.sfx("heal");
          const it = act.item; const msgs = [];
          if (it.healAmount > 0) { const h = Math.min(pl.maxHp - pl.hp, it.healAmount); pl = { ...pl, hp: pl.hp + h }; setPlayer(prev => ({ ...prev, hp: pl.hp })); msgs.push(`HPが${h}回復`); }
          if (it.mpRestore  > 0) { const m = Math.min(pl.maxMp - pl.mp, it.mpRestore);  pl = { ...pl, mp: pl.mp + m }; setPlayer(prev => ({ ...prev, mp: pl.mp })); msgs.push(`MPが${m}回復`); }
          addLog(`「${it.name}」を使った！ ${msgs.join("・")}！`, "heal");
          setItems(prev => prev.map(i => i.id === it.id ? { ...i, count: i.count - 1 } : i));
        }
      }

      // ── Masaya ──
      else if (actor.id === "masaya") {
        const act = masAction;
        if (!act) continue;
        if (act.type === "attack") {
          const dmg = calcPhys(pt.attack, en.defense);
          addLog(`Masayaの攻撃！ ${en.name}に${dmg}のダメージ！`, "damage");
          en = { ...en, hp: Math.max(0, en.hp - dmg) };
          setEnemy(prev => ({ ...prev, hp: en.hp })); await hitAnimation();
          if (en.hp <= 0) { handleVictory({ ...en }); ended = true; break; }
        } else if (act.type === "skill") {
          const sk = act.skill;
          if (pt.mp < sk.mpCost) {
            addLog("MasayaのMPが足りない！ 通常攻撃に切り替え！", "system");
            const dmg = calcPhys(pt.attack, en.defense);
            addLog(`Masayaの攻撃！ ${en.name}に${dmg}のダメージ！`, "damage");
            en = { ...en, hp: Math.max(0, en.hp - dmg) };
            setEnemy(prev => ({ ...prev, hp: en.hp })); await hitAnimation();
            if (en.hp <= 0) { handleVictory({ ...en }); ended = true; break; }
          } else {
            pt = { ...pt, mp: pt.mp - sk.mpCost }; setPartner(prev => ({ ...prev, mp: pt.mp }));
            if (sk.type === "cover") {
              MusicEngine.sfx("skill");
              addLog(`Masayaは「${sk.name}」！ Natsumiを守る構えを取った！`, "skill");
            } else if (sk.type === "attack") {
              const dmg = calcSkill(pt.attack, sk.powerMultiplier, en.defense);
              addLog(`Masayaの「${sk.name}」！ ${en.name}に${dmg}のダメージ！`, "skill");
              en = { ...en, hp: Math.max(0, en.hp - dmg) };
              setEnemy(prev => ({ ...prev, hp: en.hp })); await hitAnimation();
              if (en.hp <= 0) { handleVictory({ ...en }); ended = true; break; }
            } else if (sk.type === "boost") {
              MusicEngine.sfx("skill");
              addLog(`Masayaは「${sk.name}」！ Natsumiの攻撃力が上がった！`, "skill");
              boostFlagRef.current = true;
            } else if (sk.type === "break") {
              const dmg = Math.max(1, Math.floor(pt.attack * sk.powerMultiplier) + rand(-8, 8));
              addLog(`Masayaの「${sk.name}」！ 防御を無視して${en.name}に${dmg}のダメージ！`, "skill");
              en = { ...en, hp: Math.max(0, en.hp - dmg) };
              setEnemy(prev => ({ ...prev, hp: en.hp })); await hitAnimation();
              if (en.hp <= 0) { handleVictory({ ...en }); ended = true; break; }
            }
          }
        }
      }

      // ── 敵 ──
      else if (actor.id === "enemy") {
        await wait(420);
        let targetNatsumi = true;
        if (!pt.ko) {
          if (masayCovering) {
            targetNatsumi = false;
            addLog(`Masayaが${en.name}の攻撃に割り込んだ！`, "system");
          } else {
            targetNatsumi = Math.random() < 0.65;
          }
        }
        if (targetNatsumi) {
          MusicEngine.sfx("damage");
          const dmg = calcPhys(en.attack, pl.defense);
          addLog(`${en.name}の攻撃！ Natsumiに${dmg}のダメージ！`, "damage");
          pl = { ...pl, hp: Math.max(0, pl.hp - dmg) }; setPlayer(prev => ({ ...prev, hp: pl.hp }));
          if (pl.hp <= 0) { await wait(380); addLog("Natsumiは倒れてしまった…", "system"); setPhase("gameover"); ended = true; }
        } else {
          MusicEngine.sfx("damage");
          const dmg = calcPhys(en.attack, pt.defense ?? 30);
          addLog(`${en.name}の攻撃！ Masayaに${dmg}のダメージ！`, "damage");
          const newHp = Math.max(0, pt.hp - dmg);
          const newKo = newHp <= 0;
          pt = { ...pt, hp: newHp, ko: newKo }; setPartner(prev => ({ ...prev, hp: pt.hp, ko: pt.ko }));
          if (newKo) { await wait(280); addLog("Masayaが倒れた！ でもNatsumiは戦い続ける！", "system"); }
        }
      }
    }

    if (!ended) setPhase("select_natsumi");
  }, [player, partner, enemy, addLog, hitAnimation, handleVictory]);

  // ── コマンド選択ハンドラ ─────────────────────────────────
  const gotoMasaya = useCallback((natAction) => {
    MusicEngine.sfx("confirm");
    pendingNatRef.current = natAction;
    if (partner.ko) { executeAllActions(natAction, null); }
    else             { setPhase("select_masaya"); }
  }, [partner.ko, executeAllActions]);

  const handleNatFight       = useCallback(() => gotoMasaya({ type:"attack" }),          [gotoMasaya]);
  const handleNatSkillSelect = useCallback(sk => {
    if (sk.type === "heal") { pendingHugRef.current = sk; setPhase("select_hug_target"); }
    else gotoMasaya({ type:"skill", skill: sk });
  }, [gotoMasaya]);
  const handleHugTarget      = useCallback(tgt => gotoMasaya({ type:"skill", skill: pendingHugRef.current, target: tgt }), [gotoMasaya]);
  const handleNatItemSelect  = useCallback(it => gotoMasaya({ type:"item",  item:  it }), [gotoMasaya]);
  const handleMasFight       = useCallback(() => executeAllActions(pendingNatRef.current, { type:"attack" }), [executeAllActions]);
  const handleMasSkillSelect = useCallback(sk => executeAllActions(pendingNatRef.current, { type:"skill", skill: sk }), [executeAllActions]);

  // ── 勝利後「つぎへ」 ─────────────────────────────────────
  const handleVictoryNext = useCallback(() => {
    // 戦闘後のひと息：HP/MPを少し回復し、Masayaは復帰（使いすぎは取り返せないが詰みは防ぐ）
    setPlayer(prev => ({
      ...prev,
      exp: prev.exp + (victoryInfo?.enemy?.exp ?? 0),
      hp:  Math.min(prev.maxHp, prev.hp + Math.floor(prev.maxHp * 0.25)),
      mp:  Math.min(prev.maxMp, prev.mp + 25),
    }));
    setPartner(prev => ({
      ...prev,
      ko: false,
      hp:  prev.ko ? Math.floor(prev.maxHp * 0.4) : Math.min(prev.maxHp, prev.hp + Math.floor(prev.maxHp * 0.25)),
      mp:  Math.min(prev.maxMp, prev.mp + 15),
    }));
    if (victoryInfo?.skillUnlockMsg) {
      const { who, skillId } = victoryInfo.skillUnlockMsg;
      if (who === "natsumi") setUnlockedNat(prev => prev.includes(skillId) ? prev : [...prev, skillId]);
      if (who === "masaya")  setUnlockedMas(prev => prev.includes(skillId) ? prev : [...prev, skillId]);
    }
    if (SCENARIO[scenarioIdx]?.isFinal) { setScreen("ending"); return; }
    advanceScenario(scenarioIdx); setVictoryInfo(null); setPhase("select_natsumi");
  }, [victoryInfo, scenarioIdx, advanceScenario]);

  const handleRetry = useCallback(() => {
    setPlayer({ ...PLAYER_INITIAL }); setPartner({ ...PARTNER_INITIAL });
    setItems(ITEMS_DATA.map(i => ({ ...i })));
    setUnlockedNat([...NATSUMI_INITIAL_SKILLS]); setUnlockedMas([...MASAYA_INITIAL_SKILLS]);
    setEquipment([]);
    advanceScenario(-1);
  }, [advanceScenario]);

  // ── レンダリング ─────────────────────────────────────────
  const font = "'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif";
  const isExec = phase === "executing";
  const natSkills = SKILLS_DATA.filter(sk => unlockedNat.includes(sk.id));
  const masSkills = MASAYA_SKILLS_DATA.filter(sk => unlockedMas.includes(sk.id));

  // どの画面でも前面に出すオーバーレイ（タイトル確認・装備）
  const titleModal = showTitleConfirm && <TitleConfirmModal onConfirm={confirmGoTitle} onCancel={() => setShowTitleConfirm(false)} />;
  const equipModal = showEquip && <EquipScreen equipment={equipment} player={player} partner={partner} onToggle={toggleEquip} onClose={() => setShowEquip(false)} />;
  const toggleMusic = () => {
    const m = !musicMuted;
    setMusicMuted(m);
    MusicEngine.setMuted(m);
    try { localStorage.setItem("natsumiBGM_muted", m ? "1" : "0"); } catch {}
  };
  // 上部バーに埋め込むミュート切替ボタン
  const musicToggleStyle = {
    width:26, height:26, borderRadius:7, flexShrink:0,
    background:"#1e293b", border:`1px solid ${musicMuted ? "#475569" : "#fbbf24"}`,
    color: musicMuted ? "#64748b" : "#fbbf24", fontSize:13, cursor:"pointer",
    display:"flex", alignItems:"center", justifyContent:"center", padding:0,
  };
  const MusicToggle = () => (
    <button onClick={toggleMusic} title="BGM ON/OFF" style={musicToggleStyle}>{musicMuted ? "🔇" : "🎵"}</button>
  );
  // バーの無い画面（タイトル等）用のフローティングボタン
  const musicBtnFloating = (
    <button onClick={toggleMusic} title="BGM ON/OFF" style={{
      ...musicToggleStyle,
      position:"absolute", top:8, right:8, zIndex:400,
      width:30, height:30, fontSize:14, background:"rgba(15,23,42,.82)", boxShadow:"0 2px 8px rgba(0,0,0,.4)",
    }}>{musicMuted ? "🔇" : "🎵"}</button>
  );
  const wrap = (content, hasBar) => (
    <div style={{ height:"100%", display:"flex", flexDirection:"column", fontFamily:font, userSelect:"none", background:"#05050f", position:"relative" }}>
      {content}
      {!hasBar && musicBtnFloating}
      {equipModal}
      {titleModal}
    </div>
  );

  if (screen === "title") return wrap(
    <TitleScreen onNewGame={startNewGame} onContinue={startContinue} onContinueFile={startContinueFile} />
  );
  if (screen === "ending") return wrap(
    <EndingScreen player={player} partner={partner} onTitle={goTitle} />
  );
  if (currentEvent?.type === "skill_unlock") return wrap(
    <SkillUnlockScreen event={currentEvent} onDone={() => {
      if (currentEvent.who === "natsumi") setUnlockedNat(prev => prev.includes(currentEvent.skillId) ? prev : [...prev, currentEvent.skillId]);
      if (currentEvent.who === "masaya")  setUnlockedMas(prev => prev.includes(currentEvent.skillId) ? prev : [...prev, currentEvent.skillId]);
      advanceScenario(scenarioIdx);
    }} />
  );
  if (currentEvent?.type === "dialogue") return wrap(
    <React.Fragment>
      <SaveToast show={showToast} />
      <div style={{ padding:"5px 10px", background:"linear-gradient(135deg,#111827,#0f172a)", borderBottom:"1px solid #1e293b", display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0 }}>
        <button onClick={goTitle} style={{ background:"none", border:"none", color:"#fbbf24", fontSize:13, fontWeight:"bold", cursor:"pointer", padding:0 }}>🎮 Natumi no Bouken</button>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <MusicToggle />
          <button onClick={handleSave} style={{ background:"#1e293b", border:"1px solid #334155", borderRadius:6, color:"#94a3b8", fontSize:10, padding:"3px 8px", cursor:"pointer" }}>💾</button>
        </div>
      </div>
      <DialogueScreen
        key={scenarioIdx}
        event={currentEvent} player={player}
        onDone={handleDialogueDone} onGameOver={handleDialogueGameOver} onRetryBoss={handleRetryBoss}
        applyBondDelta={applyBondDelta} applyStatDelta={applyStatDelta} applyPartnerHpRestore={applyPartnerHpRestore}
        initialPageIdx={initDlgPage} initialBranchId={initDlgBranch}
        onStateChange={(pg, br) => { setDialoguePage(pg); setDialogueBranch(br); }}
      />
    </React.Fragment>,
    true
  );
  if (currentEvent?.type === "item") return wrap(
    <React.Fragment>
      <div style={{ padding:"5px 10px", background:"linear-gradient(135deg,#111827,#0f172a)", borderBottom:"1px solid #1e293b", display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0 }}>
        <button onClick={goTitle} style={{ background:"none", border:"none", color:"#fbbf24", fontSize:13, fontWeight:"bold", cursor:"pointer", padding:0 }}>🎮 Natumi no Bouken</button>
        <MusicToggle />
      </div>
      <ItemEventScreen event={currentEvent} onDone={() => handleItemEventDone(currentEvent)} />
    </React.Fragment>,
    true
  );
  if (phase === "victory" && victoryInfo) return wrap(
    <VictoryScreen enemy={victoryInfo.enemy} expGained={victoryInfo.expGained} levelUpMsg={victoryInfo.levelUpMsg} skillUnlockMsg={victoryInfo.skillUnlockMsg} onNext={handleVictoryNext} />
  );
  if (phase === "gameover") return wrap(
    <GameOverScreen onRetry={handleRetry} onTitle={goTitle} />
  );

  // バトル画面
  const bottomMenu =
    phase === "select_natsumi_skill" ? <NatsumiSkillMenu skills={natSkills} player={player} onSelect={handleNatSkillSelect} onBack={() => setPhase("select_natsumi")} /> :
    phase === "select_hug_target"    ? <HugTargetButtons player={player} partner={partner} onSelect={handleHugTarget} onBack={() => setPhase("select_natsumi_skill")} /> :
    phase === "select_natsumi_item"  ? <ItemMenu items={items} onSelect={handleNatItemSelect} onBack={() => setPhase("select_natsumi")} /> :
    phase === "select_masaya"        ? <MasayaCommandButtons partner={partner} onFight={handleMasFight} onSkill={() => setPhase("select_masaya_skill")} disabled={isExec} /> :
    phase === "select_masaya_skill"  ? <MasayaSkillMenu skills={masSkills} partner={partner} onSelect={handleMasSkillSelect} onBack={() => setPhase("select_masaya")} /> :
    <NatsumiCommandButtons onFight={handleNatFight} onSkill={() => setPhase("select_natsumi_skill")} onItem={() => setPhase("select_natsumi_item")} onSave={handleSave} onEquip={() => setShowEquip(true)} onTitle={goTitle} disabled={isExec} />;

  return wrap(
    <React.Fragment>
      <SaveToast show={showToast} />
      <div style={{ padding:"4px 10px", background:"linear-gradient(135deg,#111827,#0f172a)", borderBottom:"1px solid #1e293b", display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0 }}>
        <button onClick={goTitle} style={{ background:"none", border:"none", color:"#fbbf24", fontSize:13, fontWeight:"bold", cursor:"pointer", padding:0 }}>🎮 Natumi no Bouken</button>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <TurnOrderBadge player={player} partner={partner} enemy={enemy} />
          <span style={{ color:"#475569", fontSize:9 }}>{enemy?.boss ? "⚠️ BOSS" : `第${enemy?.chapter ?? "?"}章`}</span>
          <button onClick={() => { setDebugMode(p => !p); if (!debugMode && enemy) setEnemy(e => ({ ...e, hp:1 })); }} style={{ padding:"2px 6px", background: debugMode ? "#7f1d1d" : "#1e293b", border:`1px solid ${debugMode ? "#ef4444" : "#334155"}`, borderRadius:5, color: debugMode ? "#fca5a5" : "#475569", fontSize:9, fontWeight:"bold", cursor:"pointer" }}>
            {debugMode ? "🐛 ON" : "DBG"}
          </button>
          <MusicToggle />
        </div>
      </div>
      <div style={{ flex:"0 0 42%", display:"flex", flexDirection:"column", overflow:"hidden", borderBottom:"2px solid #1e293b",
        backgroundColor:"#0c1220",
        backgroundImage: enemy && ENEMY_BG[enemy.id]
          ? `linear-gradient(180deg,rgba(5,5,15,.35),rgba(5,5,15,.55) 55%,rgba(5,5,15,.9)), url(${ENEMY_BG[enemy.id]})`
          : "linear-gradient(180deg,#0c1220,#05050f)",
        backgroundSize:"cover", backgroundPosition:"center" }}>
        {enemy && <EnemyArea    enemy={enemy} />}
        {enemy && <EnemyGraphic enemy={enemy} shaking={shaking} flashing={flashing} />}
        <PartyPortraits partner={partner} />
        <PlayerStatus player={player} partner={partner} />
      </div>
      <div style={{ flex:"1 1 0", display:"flex", flexDirection:"column", overflow:"hidden", minHeight:0 }}>
        <BattleLog logs={logs} logRef={logRef} />
        {bottomMenu}
      </div>
    </React.Fragment>,
    true
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
